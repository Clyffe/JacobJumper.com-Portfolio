<div class="sidebar">

    <!-- <div class="logo-mark">
      <span class="logo-mark__initials">J.J.</span>
      <div class="logo-mark__line"></div>
    </div> -->
    <div class="logo-meta">
      <span class="logo-meta__name">Jacob Jumper</span>
      <span class="logo-meta__role">Software Engineer</span>
    </div>
  </div>

  <!-- ── Nav ── -->
  <nav class="sidebar__nav" aria-label="Primary">
    @for (item of navItems; track item.path) {
      <a
        class="nav-item"
        [routerLink]="item.path"
        routerLinkActive="nav-item--active"
        [routerLinkActiveOptions]="{ exact: item.path === '/' }"
      >
        <span class="nav-item__dot"></span>
        <span class="nav-item__label">{{ item.label }}</span>
      </a>
    }
  </nav>
